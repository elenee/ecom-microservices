services:
  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - SERVICE=user-service
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - rabbitmq

  product-service:
    build: 
      context: .
      dockerfile: Dockerfile
      args:
        - SERVICE=product-service
    ports:
      - "3001:3000"
    env_file:
      - .env
    depends_on:
      - rabbitmq

  cart-service:
    build: 
      context: .
      dockerfile: Dockerfile
      args:
        - SERVICE=cart-service
    ports:
      - "3002:3000"
    env_file:
      - .env
    depends_on:
      - rabbitmq

  order-service:
    build: 
      context: .
      dockerfile: Dockerfile
      args:
        - SERVICE=order-service
    ports:
      - "3003:3000"
    env_file:
      - .env
    depends_on:
      - rabbitmq

  payment-service:
    build: 
      context: .
      dockerfile: Dockerfile
      args:
        - SERVICE=payment-service
    ports:
      - "3004:3000"
    env_file:
      - .env
    depends_on:
      - rabbitmq

  notification-service:
    build: 
      context: .
      dockerfile: Dockerfile
      args:
        - SERVICE=notification-service
    ports:
      - "3005:3000"
    env_file:
      - .env
    depends_on:
      - rabbitmq

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"